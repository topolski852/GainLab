<svg xmlns="http://www.w3.org/2000/svg" width="960" height="200" viewBox="0 0 960 200">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a2236"/>
      <stop offset="100%" stop-color="#0d111a"/>
    </radialGradient>
    <!-- circuit dot grid -->
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1e3a5f" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- background -->
  <rect width="960" height="200" fill="url(#bg)" rx="12"/>
  <rect width="960" height="200" fill="url(#dots)" rx="12" opacity="0.6"/>

  <!-- accent line top -->
  <rect x="0" y="0" width="960" height="2" fill="#4a9eff" rx="1" opacity="0.6"/>

  <!-- logo text -->
  <text x="480" y="108" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="80" font-weight="700" text-anchor="middle" letter-spacing="-2">
    <tspan fill="#4a9eff">Gain</tspan><tspan fill="#f5c842">Lab</tspan>
  </text>

  <!-- tagline -->
  <text x="480" y="148" font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="16" font-weight="400" fill="#7a9bbf" text-anchor="middle" letter-spacing="3">
    FRC MOTOR TUNING SUITE · TEAM 1507
  </text>

  <!-- accent line bottom -->
  <rect x="0" y="198" width="960" height="2" fill="#f5c842" rx="1" opacity="0.4"/>
</svg>
